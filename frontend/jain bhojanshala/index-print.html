<!DOCTYPE html>
<html lang="gu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>જૈન ભોજનશાળા શોધો · Jain Bhojanshala Finder</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+Bhai+2:wght@400;500;600;700;800&family=Mukta+Vaani:wght@300;400;500;600;700&family=Hind+Vadodara:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="image-slot.js"></script>

  <style>
    @media print {
      @page {
        size: landscape;
        margin: 0.5cm;
      }
      
      html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
      }

      .stage {
        position: static;
        display: block;
        width: 100%;
        height: 100%;
        background: none;
      }

      .device-scale {
        transform: none !important;
        display: block;
        width: 100%;
        height: 100%;
      }

      /* freeze all animations at end state */
      *, *::before, *::after {
        animation-delay: -99s !important;
        animation-duration: .001s !important;
        animation-iteration-count: 1 !important;
        animation-fill-mode: both !important;
        animation-play-state: running !important;
        transition-duration: 0s !important;
      }

      /* hide interactivity chrome */
      .twk-panel,
      .bottom-nav,
      .admin-btn,
      .cover-back,
      .cover-top-right,
      button {
        display: none !important;
      }

      /* show all cards on one page */
      .scroll-area {
        overflow: visible !important;
        height: auto !important;
        max-height: none !important;
      }

      .scroll-pad {
        display: none !important;
      }

      /* collapse the hero to fit more */
      .hero {
        padding: 8px 16px 12px;
      }

      .hero-title {
        font-size: 20px;
        line-height: 1.1;
      }

      .hero-sub {
        font-size: 12px;
        margin: 5px 0 0;
      }

      .lang-switch {
        display: none !important;
      }

      .search-card {
        margin: 10px 0 8px;
        padding: 10px;
      }

      .search-input {
        font-size: 14px;
      }

      .search-btn {
        display: none !important;
      }

      .loc-row {
        display: none !important;
      }

      .search-row {
        height: 40px;
      }

      /* tighten chips */
      .chip-scroll {
        margin: 0 calc(-1 * var(--screen-pad));
        padding: 2px var(--screen-pad);
        gap: 6px;
      }

      .chip {
        padding: 7px 11px;
        font-size: 12px;
      }

      /* compact food finder */
      .smart {
        margin: 12px 16px 0;
        padding: 10px;
      }

      .smart-head {
        margin-bottom: 8px;
      }

      .block-title {
        font-size: 16px;
      }

      .block-sub {
        font-size: 12px;
      }

      .foodtag-grid {
        gap: 6px;
      }

      .foodtag {
        padding: 8px 3px 6px;
      }

      .foodtag-emoji {
        font-size: 18px;
      }

      .foodtag-name {
        font-size: 10px;
      }

      .foodtag-count {
        min-width: 18px;
        height: 18px;
        font-size: 9px;
      }

      /* results header */
      .results-head {
        padding: 0 16px;
        margin-top: 12px;
      }

      .result-count {
        min-width: 22px;
        height: 22px;
        font-size: 12px;
      }

      .sort-btn {
        display: none !important;
      }

      .active-food-banner {
        display: none !important;
      }

      /* cards */
      .cards {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        padding: 10px 16px 0;
      }

      .card {
        break-inside: avoid;
      }

      .card-photo {
        height: 100px;
      }

      .card-photo-top {
        top: 5px;
        left: 5px;
        right: 5px;
      }

      .dist-pill {
        font-size: 10px;
        padding: 3px 7px;
      }

      .card-body {
        padding: 10px;
        gap: 8px;
      }

      .card-name {
        font-size: 14px;
      }

      .card-area {
        font-size: 11px;
      }

      .meal-triple {
        gap: 4px;
      }

      .meal-pill {
        padding: 5px 2px;
        font-size: 10px;
      }

      .card-prices {
        display: none !important;
      }

      .menu-preview {
        gap: 4px;
      }

      .menu-chip {
        font-size: 10px;
        padding: 3px 7px;
      }

      .card-actions {
        display: none !important;
      }

      .empty-state {
        display: none !important;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- data first (plain script, runs during parse) -->
  <script src="data.js"></script>

  <!-- components (babel, run in order after Babel loads) -->
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="frames/ios-frame.jsx"></script>
  <script type="text/babel" src="shared.jsx"></script>
  <script type="text/babel" src="home.jsx"></script>
  <script type="text/babel" src="details.jsx"></script>
  <script type="text/babel" src="admin.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>

  <!-- fit the fixed-size phone to any viewport -->
  <script>
    (function () {
      var DW = 402, DH = 874, PAD = 28;
      function fit() {
        var el = document.querySelector('.device-scale');
        if (!el) return false;
        var s = Math.min(1, (window.innerWidth - PAD) / DW, (window.innerHeight - PAD) / DH);
        el.style.transform = 'scale(' + s + ')';
        return true;
      }
      window.addEventListener('resize', fit);
      var tries = 0;
      var iv = setInterval(function () { if (fit() || ++tries > 60) clearInterval(iv); }, 80);
    })();

    // trigger print after fonts and React have loaded
    window.addEventListener('load', function () {
      setTimeout(function () {
        window.print();
      }, 500);
    });
  </script>
</body>
</html>
