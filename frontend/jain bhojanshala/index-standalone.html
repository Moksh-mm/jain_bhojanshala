  <!-- fit the fixed-size phone to any viewport -->
  <script>
    (function () {
      var DW = 402, DH = 874, PAD = 28;
      function fit() {
        var el = document.querySelector('.device-scale');
        if (!el) return false;
        var s = Math.min(1, (window.innerWidth - PAD) / DW, (window.innerHeight - PAD) / DH);
        el.style.transform = 'scale(' + s + ')';
        return true;
      }
      window.addEventListener('resize', fit);
      var tries = 0;
      var iv = setInterval(function () { if (fit() || ++tries > 60) clearInterval(iv); }, 80);
    })();
  </script>
